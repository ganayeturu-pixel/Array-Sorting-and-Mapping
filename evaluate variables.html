<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Array Mapping</p>
    <p id="result"></p>

    <button onclick="myFunction()"> Try it </button>
    
    <script>
        function myFunction() {
            var x = 10;
            var y = 20;

            var a = eval("x + y");
            var b = eval("2 * 2");
            var c = eval("y - x");

            var result = a + b + c;
            document.getElementById("result").innerHTML = result;
        }
    </script>
</body>
</html>
