<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Array Mapping</p>
    <p id="product value"></p>
    <script>
        
        var numbers = [1, 2, 3 ,4 , 5];
        
        function myfunction(num) {
            return num * 10;
        }
        var productValues = numbers.map(myfunction);
        document.getElementById("product value").innerHTML = productValues;
    </script>
</body>
</html>
